# 网站标题
title: 微不足道的博客
# 网站标题后缀
suffix: 没什么
# 作者名称
author: Lanjie You
# 网站关键字
keyword: hexo,个人博客
#false是否开启文章背景图显示(随机图片)
is_article_img: true  
# 网站描述
web_description: 我的个人博客，使用GitBook样式主题构建。
# 首页文章布局 默认 'card' 可选择 'block-card'
home_layout: card
# 导航名称
menus_title:
  home: HOME
  archive: ARCHIVE
  categories: CATEGORIES
  tags: TAGS
  about: ABOUT
# 导航 （不建议修改）
menus:
  home: /
  archive: /archives
  categories: /categories
  tags: /tags
  about: /about
  
# logo
logo: /image/logo.png
# 网页标签上那个小图标 一定要用本地存储
icon: /image/favicon.ico
# 每个页面的展示的图标和一句话
headers:
    home: {
      message: "欢迎来到我的博客",
      icon: "/image/logo.png"
    }
    archives: {
      # 这里会替换掉两个变量{ year 年，number 总数 } 当然也可以不写这两个变量
      message: "用了 year 年居然只写了一共 number 篇文章!",
      icon: "https://cdn.jsdelivr.net/gh/duogongneng/MyBlogImg/imgicon-remixicon.svg"
    }
    tags: {
      message: "这里是一些展示的标签",
      icon: "https://cdn.jsdelivr.net/gh/duogongneng/MyBlogImg/imgtags.svg"
    }
    categories: {
      message: "文章分类",
      icon: "https://cdn.jsdelivr.net/gh/duogongneng/MyBlogImg/imgblogmyCategory.svg"
    }

# 网页访问统计
web_analytics:  
  enable: false #需要改为true
  baidu: 4b5fe1472f22fadsfs  # （替换）百度统计的 Key，参见 https://tongji.baidu.com/sc-web/10000033910/home/site/getjs?siteId=13751376 代码获取中 hm.js? 后边的字符串
# 评论 
gitalk:
  clientID: 761f5861324f23d7dff3 # （需要替换）GitHub Application Client ID.
  clientSecret: c736194022cb48cbccc4bc56a449e6945f744e2c #（需要替换）GitHub Application Client Secret.
  repo: gitalk-comments #（需要替换）GitHub repository.
  owner: youlanjie #（需要替换）GitHub repository 所有者，可以是个人或者组织。
  admin: 'youlanjie' #（需要替换）GitHub repository 的所有者和合作者 (对这个 repository 有写权限的用户)。

# 底部显示的图标（github 或者其他）
bottomIcon: 
  #可以多个
  - {
    #描述名称
    name: '主题的Github',
    #图标    
    iconLink: '/image/logo2.png',
    #跳转链接    
    toUrl: 'https://github.com/79E/hexo-theme-quiet'
  }
# 友情链接
linksList:
  - {
    title: 'Quiet',
    intro: '收藏回忆与分享技术的地方',
    link: 'https://github.com/79E/hexo-theme-quiet',
    image: 'https://cdn.jsdelivr.net/gh/duogongneng/MyBlogImg/imgIMG_7327.jpeg'
  }

#默认的cover (默认缩略图) 在没有填写（这里可以替换（可以是api也可以是固定的图））
default_cover: /img/background.jpg
